function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function sto(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
function lod(k, d) { try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : d; } catch { return d; } }
function buildSched(startStr) {
  const all = [];
  LEC_GROUPS.forEach(g => { for (let i = 1; i <= g.total; i++) all.push({ gid: g.id, no: i }); });
  const ppd = Math.ceil(all.length / 30);
  const days = []; let idx = 0;
  for (let d = 0; d < 30; d++) {
    const dt = new Date(startStr); dt.setDate(dt.getDate() + d);
    const ds = dt.toISOString().split("T")[0];
    const sl = all.slice(idx, idx + ppd); idx += ppd;
    if (sl.length > 0) days.push({ day: d + 1, date: ds, lecs: sl });
  }
  if (idx < all.length) days[days.length - 1].lecs.push(...all.slice(idx));
  return days;
}

                return (
                  <div key={g.id} style={{...S.gCard,borderTop:`2px solid ${g.color}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                      <span style={{fontSize:16}}>{g.icon}</span>
                      <span style={{fontSize:11,fontWeight:900,color:g.color}}>{dc}/{g.total}</span>
                    </div>
                    <div style={{fontSize:11,fontWeight:700,color:"#ccc",marginBottom:6}}>{g.label}</div>
                    <div style={{height:4,background:"#2a2a3e",borderRadius:2,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${p}%`,background:g.color,transition:"width .5s"}}/>
                    </div>
                    <div style={{fontSize:10,color:g.color,marginTop:2,fontWeight:700}}>{p}%</div>
                  </div>
                );
              })}
            </div>

            {/* 오늘 학습 */}
            {todayPlan && (
              <>
                <h3 style={{...S.sec,marginTop:16}}>☀️ 오늘 학습 <span style={{fontWeight:400,color:"#666",fontSize:11}}>({today})</span></h3>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                  <div style={{flex:1,height:7,background:"#1e1e2e",borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${Math.round(todayDone/todayPlan.lecs.length*100)}%`,background:"linear-gradient(90deg,#4ECDC4,#FFE66D)",transition:"width .5s"}}/>
                  </div>
                  <span style={{fontSize:12,color:"#4ECDC4",fontWeight:800}}>{todayDone}/{todayPlan.lecs.length}</span>
                </div>
                {todayDone === todayPlan.lecs.length && (
                  <div style={{background:"#4ECDC422",border:"1px solid #4ECDC4",borderRadius:12,padding:"12px 14px",marginBottom:10,textAlign:"center"}}>
                    <span style={{fontSize:20}}>🎉</span> <span style={{color:"#4ECDC4",fontWeight:800}}>오늘 목표 완료!</span>
                  </div>
                )}
                {todayPlan.lecs.map((l,i) => {
                  const g = getG(l.gid); const key = `${l.gid}_${l.no}`; const isDone = !!lecDone[key];
                  return (
                    <div key={i} style={{...S.lecCard,opacity:isDone?.55:1,borderLeft:`3px solid ${g?.color}`}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div>
                          <span style={{...S.badge,background:(g?.color||"#888")+"22",color:g?.color,marginBottom:4,display:"inline-block"}}>{g?.icon} {g?.label}</span>
                          <div style={{fontSize:13,fontWeight:700,color:isDone?"#888":"#ddd"}}>{g?.label} {l.no}강</div>
                        </div>
                        <button style={{...S.doneBtn,background:isDone?g?.color:"transparent",border:`2px solid ${g?.color}`,color:isDone?"#fff":g?.color}}
                          onClick={()=>saveLec({...lecDone,[key]:!isDone})}>
                          {isDone?"✓ 완료":"완료"}
                        </button>
                      </div>
                    </div>
                  );
                })}
              </>
            )}

            {/* 30일 전체 */}
            <h3 style={{...S.sec,marginTop:16}}>🗓 30일 전체 계획</h3>
            {sched.map(day => {
              const isToday = day.date===today;
              const isPast = day.date<today;
              const dd = day.lecs.filter(l=>lecDone[`${l.gid}_${l.no}`]).length;
              const allDone = dd===day.lecs.length;
              return (
                <div key={day.day} style={{
                  ...S.dayCard,
                  borderColor:isToday?"#4ECDC4":allDone&&isPast?"#4ECDC444":"#1e1e2a",
                  background:isToday?"#0a1a1a":"#13131e",
                }}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <div style={{display:"flex",alignItems:"center",gap:7}}>
                      <span style={{
                        ...S.badge,fontWeight:900,
                        background:isToday?"#4ECDC4":allDone?"#4ECDC422":"#2a2a3e",
                        color:isToday?"#000":allDone?"#4ECDC4":"#888",
                      }}>Day{day.day}</span>
                      <span style={{fontSize:11,color:"#666"}}>{day.date}</span>
                      {isToday&&<span style={{...S.badge,background:"#4ECDC422",color:"#4ECDC4"}}>오늘</span>}
                      {!isToday&&allDone&&<span style={{fontSize:11,color:"#4ECDC4"}}>✓ 완료</span>}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:11,color:allDone?"#4ECDC4":"#888",fontWeight:700}}>{dd}/{day.lecs.length}</span>
                      <div style={{width:36,height:4,background:"#2a2a3e",borderRadius:2,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${Math.round(dd/day.lecs.length*100)}%`,background:"#4ECDC4"}}/>
                      </div>
                    </div>
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                    {day.lecs.map((l,i) => {
                      const g = getG(l.gid); const key = `${l.gid}_${l.no}`; const isDone = !!lecDone[key];
                      return (
                        <button key={i}
                          style={{...S.lecChip,
                            background:isDone?g?.color:(g?.color||"#888")+"18",
                            color:isDone?"#fff":g?.color||"#888",
                            border:`1px solid ${(g?.color||"#888")}44`,
                            textDecoration:isDone?"line-through":"none",
                            opacity:isDone?.7:1,
                          }}
                          onClick={()=>saveLec({...lecDone,[key]:!isDone})}>
                          {g?.icon} {(g?.label||"").slice(0,4)} {l.no}강
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })}

            {/* 설정 모달 */}
            {showSetup && (
              <div style={S.overlay} onClick={()=>setShowSetup(false)}>
                <div style={S.modal} onClick={e=>e.stopPropagation()}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                    <span style={{fontSize:16,fontWeight:900}}>⚙️ 스케쥴 설정</span>
                    <button style={S.closeBtn} onClick={()=>setShowSetup(false)}>✕</button>
                  </div>
                  <label style={{fontSize:12,color:"#888",display:"block",marginBottom:6,fontWeight:700}}>시작일 선택</label>
                  <input type="date" style={S.inp} value={tmpStart} onChange={e=>setTmpStart(e.target.value)}/>
                  <div style={{background:"#0f0f1e",borderRadius:12,padding:12,margin:"12px 0"}}>
                    <div style={{fontSize:11,color:"#888",marginBottom:8,fontWeight:700}}>📋 강의 구성 ({TOTAL_LEC}강)</div>
                    {LEC_GROUPS.map(g => (
                      <div key={g.id} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:12,borderBottom:"1px solid #1e1e2a"}}>
                        <span style={{color:g.color}}>{g.icon} {g.label}</span>
                        <span style={{color:"#888"}}>{g.total}강</span>
                      </div>
                    ))}
                    <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0 0",fontWeight:900,color:"#FF6B35",fontSize:13}}>
                      <span>합계</span><span>{TOTAL_LEC}강 · 30일</span>
                    </div>
                  </div>
                  <div style={{background:"#FF6B3511",border:"1px solid #FF6B3533",borderRadius:10,padding:12,fontSize:12,color:"#ccc",marginBottom:12,lineHeight:1.6}}>
                    📌 하루 평균 <strong style={{color:"#FF6B35"}}>약 {Math.ceil(TOTAL_LEC/30)}강</strong>씩 30일 완주 계획이 생성됩니다.
                  </div>
                  <button style={{...S.bigBtn,width:"100%"}}
                    onClick={()=>{setSched(buildSched(tmpStart));setSchedStart(tmpStart);sto("l3_sched",buildSched(tmpStart));sto("l3_ss",tmpStart);setShowSetup(false);}}>
                    🗓 스케쥴 생성
                  </button>
                  <button style={{...S.bigBtn,width:"100%",background:"#2a2a3e",color:"#aaa",marginTop:8}}
                    onClick={()=>{saveLec({});setShowSetup(false);}}>
                    🔄 진도 초기화
                  </button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ══════════════ 노트 탭 (동영상/신차/진단) ══════════════ */}
        {(mainTab==="video"||mainTab==="newcar"||mainTab==="diag") && (() => {
          const cid = mainTab==="video"?"video":mainTab==="newcar"?"newcar":"diag";
          const cm = NOTE_CATS.find(c=>c.id===cid);
          const myNotes = notes.filter(n=>n.cat===cid);
          const shown = myNotes.filter(n=>
            noteSearch===""||n.title.includes(noteSearch)||n.body.includes(noteSearch)||(n.lec||"").includes(noteSearch)
          );
          return (
            <div style={{animation:"fu .3s ease"}}>
              {/* 헤더 */}
              <div style={{display:"flex",alignItems:"center",gap:12,paddingBottom:12,marginBottom:12,borderBottom:`2px solid ${cm.color}33`}}>
                <span style={{fontSize:28}}>{cm.icon}</span>
                <div>
                  <div style={{fontSize:15,fontWeight:900,color:cm.color}}>{cm.label}</div>
                  <div style={{fontSize:11,color:"#666"}}>{myNotes.length}개 저장됨</div>
                </div>
              </div>

              {/* 노트 작성 폼 */}
              <div style={{background:"#13131e",borderRadius:14,padding:"14px 13px",marginBottom:12,border:"1px solid #1e1e2a"}}>
                <div style={{fontSize:12,color:cm.color,fontWeight:800,marginBottom:10}}>✏️ 새 노트 추가</div>
                <select style={S.inp} value={noteLec} onChange={e=>setNoteLec(e.target.value)}>
                  <option value="">강의/교재 선택 (선택사항)</option>
                  {cid==="video" && LEC_GROUPS.map(g =>
                    [...Array(g.total)].map((_,i) => (
                      <option key={`${g.id}_${i}`} value={`${g.label} ${i+1}강`}>{g.label} {i+1}강</option>
                    ))
                  )}
                  {cid==="newcar" && [...Array(30)].map((_,i) => (
                    <option key={i} value={`신차교재 ${i+1}페이지`}>{i+1}페이지</option>
                  ))}
                  {cid==="diag" && ["ETC 진단","연료계통 진단","엔진 진단","변속기 진단","전기장치 진단","ADAS 진단","하이브리드 진단","수소연료전지 진단","브레이크 진단","에어컨 진단","기타"].map(s => (
                    <option key={s} value={s}>{s}</option>
                  ))}
                  <option value="기타">기타</option>
                </select>
                <input style={{...S.inp,marginTop:8}} placeholder="제목을 입력하세요"
                  value={noteTitle} onChange={e=>setNoteTitle(e.target.value)}/>
                <textarea style={{...S.inp,marginTop:8,height:120,resize:"vertical",fontFamily:"inherit"}}
                  placeholder={`핵심 내용을 요약하세요...\n\n예시:\n- 주요 개념\n- 시험 포인트\n- 암기 사항`}
                  value={noteBody} onChange={e=>setNoteBody(e.target.value)}/>
                <button
                  style={{...S.bigBtn,width:"100%",marginTop:8,background:cm.color,opacity:noteTitle&&noteBody?1:.4}}
                  onClick={saveNote}>💾 노트 저장</button>
              </div>

              {/* 검색 */}
              <input style={{...S.searchBox,marginBottom:10}}
                placeholder={`🔍 ${cm.label} 검색...`}
                value={noteSearch} onChange={e=>setNoteSearch(e.target.value)}/>

              {/* 노트 목록 */}
              {shown.length===0 ? (
                <div style={S.empty}>
                  <div style={{fontSize:36}}>{cm.icon}</div>
                  <div style={{marginTop:10}}>아직 저장된 노트가 없습니다</div>
                  <div style={{fontSize:11,color:"#666",marginTop:4}}>위 폼에서 첫 번째 노트를 추가해보세요</div>
                </div>
              ) : (
                shown.map(n => {
                  const isOpen = expanded[`note_${n.id}`];
                  return (
                    <div key={n.id} style={{...S.card,borderLeft:`3px solid ${cm.color}`,marginBottom:8}}>
                      <div style={S.cardHead} onClick={()=>tog(`note_${n.id}`)}>
                        <div style={{flex:1,minWidth:0}}>
                          {n.lec && <div style={{...S.badge,background:cm.color+"22",color:cm.color,marginBottom:4,display:"inline-block"}}>{n.lec}</div>}
                          <div style={{fontSize:14,fontWeight:700,color:"#ddd",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n.title}</div>
                          <div style={{fontSize:10,color:"#666",marginTop:2}}>{n.date}</div>
                        </div>
                        <span style={{...S.arrow,transform:isOpen?"rotate(180deg)":"rotate(0)"}}>▼</span>
                      </div>
                      {isOpen && (
                        <div style={{marginTop:10}} onClick={e=>e.stopPropagation()}>
                          <div style={{fontSize:13,color:"#bbb",lineHeight:1.85,whiteSpace:"pre-wrap",background:"#0d0d1a",borderRadius:10,padding:12}}>{n.body}</div>
                          <button style={{...S.wBtn,background:"#f5522215",color:"#f55",marginTop:8}}
                            onClick={()=>{if(window.confirm("이 노트를 삭제할까요?"))saveNotes(notes.filter(x=>x.id!==n.id));}}>
                            🗑 삭제
                          </button>
                        </div>
                      )}
                    </div>
                  );
                })
              )}
            </div>
          );
        })()}

      </main>
    </div>
  );
}

// ════════════════════════════════════════════
// STYLES
// ════════════════════════════════════════════
const S = {
  app:       { minHeight:"100vh", background:"#0a0a14", color:"#fff", fontFamily:"'Noto Sans KR',sans-serif", maxWidth:580, margin:"0 auto", paddingBottom:90 },
  // header
  hdr:       { background:"linear-gradient(160deg,#0f0f22,#12101e)", padding:"16px 16px 0", borderBottom:"1px solid #1e1e30", position:"sticky", top:0, zIndex:100 },
  hdrRow:    { display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 },
  hdrBadge:  { display:"inline-block", background:"#FF6B3520", color:"#FF6B35", border:"1px solid #FF6B3550", borderRadius:20, padding:"2px 12px", fontSize:11, fontWeight:700, marginBottom:5 },
  hdrTitle:  { fontFamily:"'Black Han Sans',sans-serif", fontSize:20, background:"linear-gradient(135deg,#fff 40%,#FF6B35)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", letterSpacing:-0.5 },
  hdrSub:    { fontSize:10, color:"#666", marginTop:2 },
  hdrRight:  { display:"flex", gap:6, flexShrink:0 },
  pill:      { background:"#1e1e2e", borderRadius:10, padding:"5px 10px", textAlign:"center", minWidth:44, lineHeight:1.3 },
  masterBar: { height:4, background:"#1e1e2e", margin:"0 -16px" },
  masterFill:{ height:"100%", background:"linear-gradient(90deg,#FF6B35,#FFE66D,#4ECDC4)", transition:"width .6s" },
  // top nav
  topNav:    { display:"flex", background:"#0d0d1a", borderBottom:"1px solid #1a1a26", position:"sticky", top:72, zIndex:99 },
  topTab:    { flex:1, display:"flex", flexDirection:"column", alignItems:"center", padding:"8px 2px 6px", background:"transparent", border:"none", borderBottom:"3px solid transparent", cursor:"pointer", color:"#555", gap:2, transition:"all .2s" },
  // sub tabs
  subTabs:   { display:"flex", background:"#0f0f1e", borderRadius:12, padding:4, marginBottom:14, gap:4 },
  subTab:    { flex:1, display:"flex", flexDirection:"column", alignItems:"center", padding:"7px 4px", background:"transparent", border:"none", borderRadius:8, cursor:"pointer", color:"#555", gap:2, fontSize:11, fontWeight:700, transition:"all .2s" },
  // common
  sec:       { fontSize:13, fontWeight:800, color:"#ccc", marginBottom:10 },
  grid4:     { display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8, marginBottom:4 },
  grid2:     { display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:4 },
  yrCard:    { background:"#13131e", borderRadius:12, padding:"12px 8px", textAlign:"center" },
  examCard:  { background:"#13131e", borderRadius:10, padding:"10px 12px", cursor:"pointer", transition:"background .15s" },
  catBar:    { display:"flex", alignItems:"center", gap:8, background:"#13131e", borderRadius:10, padding:"9px 12px", marginBottom:6, cursor:"pointer" },
  qzBtn:     { padding:"11px 8px", background:"#1a1a2e", color:"#ccc", border:"1px solid #2a2a3e", borderRadius:12, cursor:"pointer", fontSize:12, fontWeight:700, textAlign:"left", lineHeight:1.4 },
  searchBox: { width:"100%", background:"#1e1e2e", border:"1px solid #2a2a3e", borderRadius:12, padding:"9px 13px", color:"#fff", fontSize:13, outline:"none", boxSizing:"border-box" },
  chip:      { padding:"5px 12px", borderRadius:20, cursor:"pointer", fontSize:11, fontWeight:700, border:"none", background:"#1e1e2e", color:"#888" },
  scrollRow: { display:"flex", overflowX:"auto", gap:2, scrollbarWidth:"none" },
  stab:      { whiteSpace:"nowrap", padding:"6px 9px", background:"transparent", border:"none", borderBottom:"2px solid transparent", cursor:"pointer", color:"#555", fontSize:10, fontWeight:600, flexShrink:0 },
  card:      { background:"#13131e", borderRadius:12, padding:"11px 13px", marginBottom:8, cursor:"pointer", border:"1px solid #1e1e2a" },
  cardHead:  { display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6 },
  badge:     { fontSize:10, fontWeight:700, padding:"2px 7px", borderRadius:8 },
  arrow:     { color:"#555", fontSize:10, transition:"transform .2s", flexShrink:0, marginLeft:4 },
  qTxt:      { fontSize:13, color:"#ddd", lineHeight:1.65 },
  opts:      { marginTop:10, display:"flex", flexDirection:"column", gap:7 },
  opt:       { display:"flex", alignItems:"center", gap:8, border:"1px solid", borderRadius:10, padding:"9px 11px", fontSize:12, lineHeight:1.5, transition:"all .15s" },
  optN:      { minWidth:22, height:22, borderRadius:6, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:900, flexShrink:0 },
  ansBtn:    { marginTop:6, padding:"9px", borderRadius:10, border:"none", color:"#fff", fontWeight:800, fontSize:13, cursor:"pointer", width:"100%" },
  expl:      { background:"#0d0d1a", borderRadius:10, padding:12, marginTop:5 },
  wBtn:      { marginTop:8, padding:"7px 12px", borderRadius:8, border:"none", fontSize:11, fontWeight:700, cursor:"pointer", width:"100%" },
  bigBtn:    { padding:"11px 20px", background:"linear-gradient(135deg,#FF6B35,#f7931e)", color:"#fff", border:"none", borderRadius:12, fontWeight:800, fontSize:13, cursor:"pointer" },
  empty:     { textAlign:"center", padding:"50px 0", color:"#666" },
  // scheduler
  schedTop:  { background:"#13131e", borderRadius:14, padding:"14px 16px", display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, border:"1px solid #4ECDC433" },
  gCard:     { background:"#13131e", borderRadius:12, padding:"12px 10px" },
  lecCard:   { background:"#13131e", borderRadius:12, padding:"11px 13px", marginBottom:8, transition:"opacity .3s" },
  doneBtn:   { borderRadius:20, padding:"6px 14px", fontSize:11, fontWeight:800, cursor:"pointer", transition:"all .2s", flexShrink:0 },
  lecChip:   { fontSize:10, fontWeight:700, padding:"4px 9px", borderRadius:16, cursor:"pointer", transition:"all .15s" },
  dayCard:   { borderRadius:12, padding:"11px 13px", marginBottom:8, border:"1px solid" },
  overlay:   { position:"fixed", inset:0, background:"rgba(0,0,0,.9)", zIndex:200, display:"flex", alignItems:"flex-end", justifyContent:"center" },
  modal:     { background:"#13131e", borderRadius:"20px 20px 0 0", padding:18, width:"100%", maxWidth:580, maxHeight:"88vh", overflowY:"auto", border:"1px solid #2a2a3e" },
  closeBtn:  { background:"#2a2a3e", border:"none", color:"#aaa", borderRadius:8, width:28, height:28, cursor:"pointer", fontSize:12 },
  inp:       { width:"100%", background:"#1e1e2e", border:"1px solid #2a2a3e", borderRadius:10, padding:"9px 12px", color:"#fff", fontSize:13, outline:"none", boxSizing:"border-box" },
};

    // React 앱 마운트
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<L3Master />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('[SW] 등록 성공:', reg.scope))
          .catch(err => console.log('[SW] 등록 실패:', err));
      });
    }
  </script>
</body>
